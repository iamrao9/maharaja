<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- Mobile Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Maharaja Rentals</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f1f5f9;
    }

    iframe {
      border: none;
      width: 100%;
      height: 100%;
      display: block;
    }

    #loader {
      position: fixed;
      inset: 0;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #333;
      z-index: 9999;
    }
  </style>
</head>

<body>

  <!-- Loading -->
  <div id="loader">Loading...</div>

  <iframe id="appFrame"></iframe>

  <script>
    // ✅ Latest Script URL add kar diya hai
    const APP_URL = "https://script.google.com/macros/s/AKfycbz6jpL7l_SAl7hAhf1pfwvPQdDjEF9rUzQyi2cAMe-HSbciNqMSQCehlUeRVzlVR8gwZQ/exec";

    document.getElementById("appFrame").src = APP_URL + "?embedded=true";

    function hideLoader() {
      document.getElementById("loader").style.display = "none";
    }

    document.getElementById("appFrame").onload = hideLoader;
  </script>

</body>
</html>
